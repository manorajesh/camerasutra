name: iOS Build

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    name: Build and Test default scheme using any available iPhone simulator
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build tools
        run: brew install cmake ninja eigen

      - name: Cache OpenVINS XCFramework
        id: cache-openvins
        uses: actions/cache@v4
        with:
          path: Vendor/OpenVINS
          key: openvins-xcframework-${{ hashFiles('scripts/build_openvins_ios.sh', 'scripts/package_openvins_xcframework.sh', 'third_party/open_vins/.git') }}

      - name: Build OpenVINS XCFramework
        if: steps.cache-openvins.outputs.cache-hit != 'true'
        run: |
          brew install opencv boost ceres-solver metis suite-sparse
          PLATFORM=OS64           SDK=iphoneos        ARCHS=arm64 bash scripts/build_openvins_ios.sh
          PLATFORM=SIMULATORARM64 SDK=iphonesimulator ARCHS=arm64 bash scripts/build_openvins_ios.sh
          bash scripts/package_openvins_xcframework.sh

      - name: Cache OpenCV XCFramework
        id: cache-opencv
        uses: actions/cache@v4
        with:
          path: |
            Vendor/opencv2.xcframework
            build/opencv-ios/opencv-4.13.0-src
          key: opencv-xcframework-4.13.0-${{ runner.arch }}

      - name: Build OpenCV XCFramework
        if: steps.cache-opencv.outputs.cache-hit != 'true'
        run: |
          PLATFORM=OS64           SDK=iphoneos        ARCHS=arm64 bash scripts/build_opencv_ios.sh
          PLATFORM=SIMULATORARM64 SDK=iphonesimulator ARCHS=arm64 bash scripts/build_opencv_ios.sh
          bash scripts/package_opencv_xcframework.sh

      - name: Fetch Eigen Headers
        run: bash scripts/fetch_eigen.sh

      - name: Set Default Scheme
        run: |
          scheme_list=$(xcodebuild -list -json | tr -d "\n")
          default=$(echo $scheme_list | ruby -e "require 'json'; puts JSON.parse(STDIN.gets)['project']['targets'][0]")
          echo $default | cat >default
          echo Using default scheme: $default

      - name: Build
        env:
          scheme: ${{ 'default' }}
          platform: ${{ 'iOS Simulator' }}
        run: |
          device=$(xcrun simctl list devices available 2>/dev/null | grep -E '^\s+iPhone' | head -1 | sed -E 's/^\s+(iPhone[^(]+) \(.*$/\1/' | sed 's/ *$//')
          if [ -z "$device" ]; then device="Any iOS Simulator Device"; fi
          if [ $scheme = default ]; then scheme=$(cat default); fi
          if [ "`ls -A | grep -i \\.xcworkspace\$`" ]; then filetype_parameter="workspace" && file_to_build="`ls -A | grep -i \\.xcworkspace\$`"; else filetype_parameter="project" && file_to_build="`ls -A | grep -i \\.xcodeproj\$`"; fi
          file_to_build=`echo $file_to_build | awk '{$1=$1;print}'`
          xcodebuild build-for-testing -scheme "$scheme" -"$filetype_parameter" "$file_to_build" -destination "platform=$platform,name=$device"

      - name: Test
        env:
          scheme: ${{ 'default' }}
          platform: ${{ 'iOS Simulator' }}
        run: |
          device=$(xcrun simctl list devices available 2>/dev/null | grep -E '^\s+iPhone' | head -1 | sed -E 's/^\s+(iPhone[^(]+) \(.*$/\1/' | sed 's/ *$//')
          if [ -z "$device" ]; then device="Any iOS Simulator Device"; fi
          if [ $scheme = default ]; then scheme=$(cat default); fi
          if [ "`ls -A | grep -i \\.xcworkspace\$`" ]; then filetype_parameter="workspace" && file_to_build="`ls -A | grep -i \\.xcworkspace\$`"; else filetype_parameter="project" && file_to_build="`ls -A | grep -i \\.xcodeproj\$`"; fi
          file_to_build=`echo $file_to_build | awk '{$1=$1;print}'`
          xcodebuild test-without-building -scheme "$scheme" -"$filetype_parameter" "$file_to_build" -destination "platform=$platform,name=$device"
